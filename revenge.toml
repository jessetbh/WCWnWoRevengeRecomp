# N64Recomp config for WCW-nWo Revenge (USA). Adapted from World Tour's wcw.toml.
# Same entrypoint (0x80000400); NO overlays (single contiguous main segment - see
# disasm/revenge.yaml). Symbol-TOML mode.

[input]
entrypoint = 0x80000400
rom_file_path = "revenge.z64"
bss_section_suffix = "_bss"
symbols_file_path = "syms/dump.toml"
output_func_path = "RecompiledFuncs"
trace_mode = false

[patches]
# First-recompile bootstrap, mirroring WT's history: ALL functions containing
# cop0/cache/eret/tlb opcodes are stubbed (syms/stub_candidates.txt, generated by
# the opcode scan). As identification proceeds (WT's disasm/libultra.md method),
# these move to RENAMEs in tools/gen_symbols.py so the runtime provides them -
# exactly how WT's boot came up.
stubs = [
    "func_8001C5B0",
    "func_8001C660",
    # func_8001C740 removed: named osSetIntMask
    "func_8001C7E0",
    "func_8001C860",
    "func_80025F30",
    "func_800265AC",
    "func_8002670C",
    # func_80026AF0 removed: named osGetCount
    "func_80026B00",
    # func_80026B10/func_80026B30 removed: named __osDisableInt/__osRestoreInt
    # (see tools/gen_symbols.py + disasm/libultra.md)
    "func_80026B50",
    "func_80026C20",
    "func_80026C30",
    "func_80026C80",
    "func_80028100",
    "func_8002CA00",
    "func_8002D524",
    "func_8002EC2C",
    "func_8002EC5C",
    "func_8002EC80",
    # func_80018C24 removed 2026-07-07: NOT unrecompilable asm — it is the AL synth
    # event-post function (alSynStartVoice/SetVol/SetPitch/StopVoice all route
    # through it); the stub was the silent-audio root cause. IDO shared-tail split
    # (j into func_80018CAC) fixed by size-extending to 0xA0 in symbol_addrs.txt.
    # 2026-07-07 stubs review: the 13 non-privileged bootstrap stubs (game code
    # stubbed for control-flow reasons, syms/bootstrap_stubs.log) were re-attempted
    # after the func_80018C24 lesson — j-to-function-start is a clean tail call for
    # N64Recomp; only the ones below still fail, each with its reason.
    #
    # __osDispatchThread: no priv opcodes itself, but it is libultra's dispatcher —
    # jal'd ONLY from inside func_80025F30 (= __osException, stubbed above; its 355
    # insns end exactly at 0x800264BC) and branches back into the handler's body
    # (.L80026474/.L8002648C, __osRunQueue/__osRunningThread block). Dead code under
    # ultramodern's scheduler; stub is correct.
    "func_800264BC",
    # OS asm glue thunks that j into the 0x80001254 handler region and contain
    # swc2/lwc2 (COP2 is unusable on VR4300 — N64Recomp "Unhandled instruction:
    # swc2"): not reachable game code, runtime replaces the OS layer they serve.
    "func_8002D500",
    "func_8002D510",
]

ignored = [
]

# Idle-thread cooperative-yield fix, mirroring wcw.toml's documented patch: the idle
# thread (func_800004B8) ends in `jal func_8001C580; j 0x80000560` - a busy spin that
# never yields under ultramodern's cooperative scheduler (no interrupt preemption
# here), deadlocking the frame pipeline. Rewriting the backward j at 0x80000568 into
# a self-branch (`b .` = 0x1000FFFF) makes N64Recomp emit pause_self(), which drains
# external messages and yields - correct idle behavior.
[[patches.instruction]]
func = "func_800004B8"
vram = 0x80000568
value = 0x1000FFFF
