# N64Recomp config for WCW-nWo Revenge (USA). Adapted from World Tour's wcw.toml.
# Same entrypoint (0x80000400); NO overlays (single contiguous main segment - see
# disasm/revenge.yaml). Symbol-TOML mode.

[input]
entrypoint = 0x80000400
rom_file_path = "revenge.z64"
bss_section_suffix = "_bss"
symbols_file_path = "syms/dump.toml"
output_func_path = "RecompiledFuncs"
trace_mode = false

[patches]
# First-recompile bootstrap, mirroring WT's history: ALL functions containing
# cop0/cache/eret/tlb opcodes are stubbed (syms/stub_candidates.txt, generated by
# the opcode scan). As identification proceeds (WT's disasm/libultra.md method),
# these move to RENAMEs in tools/gen_symbols.py so the runtime provides them -
# exactly how WT's boot came up.
stubs = [
    "func_8001C5B0",
    "func_8001C660",
    "func_8001C740",
    "func_8001C7E0",
    "func_8001C860",
    "func_80025F30",
    "func_800265AC",
    "func_8002670C",
    "func_80026AF0",
    "func_80026B00",
    "func_80026B10",
    "func_80026B30",
    "func_80026B50",
    "func_80026C20",
    "func_80026C30",
    "func_80026C80",
    "func_80028100",
    "func_8002CA00",
    "func_8002D524",
    "func_8002EC2C",
    "func_8002EC5C",
    "func_8002EC80",
    "func_80018C24",
    "func_800264BC",
    "func_8002D500",
    "func_8002D510",
    "func_80096A6C",
    "func_800A77C4",
    "func_800A9010",
    "func_800ADBFC",
    "func_800AF978",
    "func_800B3BCC",
    "func_8009B2EC",
    "func_8009C148",
    "func_8009C774",
    "func_800D746C",
]

ignored = [
]

# Idle-thread cooperative-yield fix, mirroring wcw.toml's documented patch: the idle
# thread (func_800004B8) ends in `jal func_8001C580; j 0x80000560` - a busy spin that
# never yields under ultramodern's cooperative scheduler (no interrupt preemption
# here), deadlocking the frame pipeline. Rewriting the backward j at 0x80000568 into
# a self-branch (`b .` = 0x1000FFFF) makes N64Recomp emit pause_self(), which drains
# external messages and yields - correct idle behavior.
[[patches.instruction]]
func = "func_800004B8"
vram = 0x80000568
value = 0x1000FFFF
