name: WCW-nWo Revenge (USA)
sha1: e1711a2511394b9357b5f1ac8ca5cc17bd674836
options:
  basename: revenge
  target_path: revenge.z64
  elf_path: build/revenge.elf
  base_path: .
  platform: n64
  compiler: IDO

  asm_path: asm
  data_path: asm/data
  ld_script_path: revenge.ld
  ld_dependencies: True

  find_file_boundaries: True
  header_encoding: ASCII

  o_as_suffix: True
  use_legacy_include_asm: False
  mips_abi_float_regs: o32

  symbol_addrs_path:
    - symbol_addrs.txt
  reloc_addrs_path:
    - reloc_addrs.txt

  undefined_funcs_auto_path: undefined_funcs_auto.txt
  undefined_syms_auto_path: undefined_syms_auto.txt

  libultra_symbols: True
  hardware_regs: True

  rodata_string_guesser_level: 2
  data_string_guesser_level: 2

# Layout (tools/recon.py, 2026-07-07): unlike World Tour, Revenge has NO overlay
# system ? one contiguous main segment, rom 0x1000 <-> vram 0x80000400 (same
# entrypoint as WT), code to ~0xD8000 with data pockets at the jr-density gaps,
# libultra at the top (0x800D2xxx+). IPL3 loads the standard 1 MB, so the loaded
# segment runs to rom 0x101000; everything after is on-demand assets.
# Code/data boundaries below are 16KB-coarse from the density scan ? refine as
# splat output demands.
segments:
  - name: header
    type: header
    start: 0x0

  - name: ipl3
    type: bin
    start: 0x40

  - name: entry
    type: code
    start: 0x1000
    vram: 0x80000400
    subsegments:
      - [0x1000, hasm]

  - name: main
    type: code
    start: 0x1050
    vram: 0x80000450
    follows_vram: entry
    subsegments:
      - [0x1050, asm]
      # boundary moved 0x2C800 -> 0x2C840 (2026-07-07): func_8002BBCC's tail
      # (jr $ra at rom 0x2C834) was being split off as data; real CPU-code end
      # is 0x2C840 where the RSP boot ucode begins (audio ucode text at 0x2C910).
      - [0x2C840, data]
      - [0x2D600, asm]
      - [0x2D800, data]
      - [0x2E100, asm]
      - [0x2E600, data]
      - [0x2E900, asm]
      - [0x2EB00, data]
      - [0x2F500, asm]
      - [0x2F900, data]
      - [0x30B00, asm]
      - [0x30E00, data]
      - [0x31500, asm]
      - [0x31900, data]
      - [0x36B00, asm]
      - [0x36D00, data]
      - [0x3C700, asm]

  # Two CPU overlays, BOTH loaded at vram 0x80090000 - World Tour's exact
  # architecture (swap-at-same-address), just stored right after the fixed image
  # instead of at the end of ROM. 9-word descriptors at rom 0x37A30/0x37A54
  # (vram D_80036E30/D_80036E54): romStart, romEnd, entry, text/data/bss bounds.
  # Section sizes verified byte-exact against romEnd-romStart.
  - name: ovl_a
    type: code
    start: 0x3C770
    vram: 0x80090000
    exclusive_ram_id: ovl_90000
    bss_size: 0x13620
    subsegments:
      - [0x3C770, asm]
      - [0x72240, data]
      - { type: bss, vram: 0x800D6D30 }

  - name: ovl_b
    type: code
    start: 0x834A0
    vram: 0x80090000
    exclusive_ram_id: ovl_90000
    bss_size: 0x137F0
    subsegments:
      - [0x834A0, asm]
      - [0xD5FB0, data]
      - { type: bss, vram: 0x800E77B0 }

  - name: assets
    type: bin
    start: 0xDAC50

  - [0x1000000]
