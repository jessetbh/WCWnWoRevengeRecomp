name: WCW-nWo Revenge (USA)
sha1: e1711a2511394b9357b5f1ac8ca5cc17bd674836
options:
  basename: revenge
  target_path: revenge.z64
  elf_path: build/revenge.elf
  base_path: .
  platform: n64
  compiler: IDO

  asm_path: asm
  data_path: asm/data
  ld_script_path: revenge.ld
  ld_dependencies: True

  find_file_boundaries: True
  header_encoding: ASCII

  o_as_suffix: True
  use_legacy_include_asm: False
  mips_abi_float_regs: o32

  symbol_addrs_path:
    - symbol_addrs.txt
  reloc_addrs_path:
    - reloc_addrs.txt

  undefined_funcs_auto_path: undefined_funcs_auto.txt
  undefined_syms_auto_path: undefined_syms_auto.txt

  libultra_symbols: True
  hardware_regs: True

  rodata_string_guesser_level: 2
  data_string_guesser_level: 2

# Layout (tools/recon.py, 2026-07-07): unlike World Tour, Revenge has NO overlay
# system — one contiguous main segment, rom 0x1000 <-> vram 0x80000400 (same
# entrypoint as WT), code to ~0xD8000 with data pockets at the jr-density gaps,
# libultra at the top (0x800D2xxx+). IPL3 loads the standard 1 MB, so the loaded
# segment runs to rom 0x101000; everything after is on-demand assets.
# Code/data boundaries below are 16KB-coarse from the density scan — refine as
# splat output demands.
segments:
  - name: header
    type: header
    start: 0x0

  - name: ipl3
    type: bin
    start: 0x40

  - name: entry
    type: code
    start: 0x1000
    vram: 0x80000400
    subsegments:
      - [0x1000, hasm]

  - name: main
    type: code
    start: 0x1050
    vram: 0x80000450
    follows_vram: entry
    subsegments:
      - [0x1050, asm]
      - [0x2C800, data]
      - [0x2D600, asm]
      - [0x2D800, data]
      - [0x2E100, asm]
      - [0x2E600, data]
      - [0x2E900, asm]
      - [0x2EB00, data]
      - [0x2F500, asm]
      - [0x2F900, data]
      - [0x30B00, asm]
      - [0x30E00, data]
      - [0x31500, asm]
      - [0x31900, data]
      - [0x36B00, asm]
      - [0x36D00, data]
      - [0x3C700, asm]
      - [0x72200, data]
      - [0x77F00, asm]
      - [0x78100, data]
      - [0x7F100, asm]
      - [0x7F300, data]
      - [0x7FF00, asm]
      - [0x80100, data]
      - [0x82A00, asm]
      - [0x91800, data]
      - [0x91A00, asm]
      - [0xCB400, data]
      - [0xCBC00, asm]
      - [0xCBF00, data]
      - [0xCC100, asm]
      - [0xCD600, data]
      - [0xCD800, asm]
      - [0xCE100, data]
      - [0xCE200, asm]
      - [0xCE500, data]
      - [0xCE700, asm]
      - [0xCE900, data]
      - [0xCEC00, asm]
      - [0xCF200, data]
      - [0xCF400, asm]
      - [0xCF900, data]
      - [0xCFB00, asm]
      - [0xD0500, data]
      - [0xD0800, asm]
      - [0xD2400, data]
      - [0xD2500, asm]
      - [0xD2900, data]
      - [0xD2A00, asm]
      - [0xD2B00, data]
      - [0xD2C00, asm]
      - [0xD3200, data]
      - [0xD3500, asm]
      - [0xD5F00, data]
      - [0xD6500, asm]
      - [0xD6700, data]
      - [0xD7A00, asm]
      - [0xD8000, data]

  - name: assets
    type: bin
    start: 0x101000

  - [0x1000000]
